<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="/Task4/TextEditor.js" defer></script>
    <title>Text Editor</title>
</head>
<body>
    <div class="editor-div">
        <div class="editor-tools">
            <select id="font-family">
            <option value="Arial">Arial</option>
            <option value="Courier New">Courier New</option>
            <option value="Georgia">Georgia</option>
            <option value="Verdana">Verdana</option>
        </select>
           <input type="number" min="4" max="20" name="font-Size" value="5" />
        <input type="checkbox" name="italic" />Italic
        <input type="checkbox" name="bold" />Bold
        <input type="checkbox" name="underline" />Underline

        </div>
                <textarea name="textarea" rows="4" cols="60"> </textarea>


    </div>
    
</body>
</html>
